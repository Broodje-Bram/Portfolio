<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>test</title>
</head>
<body>
<style>
    .contact-section{
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .contact-form{
        max-width: 700px;
        margin-right: 50px;
    }

    .contact-form .text-box{
        background: #212121;
        color: #fff;
        border: none;
        width: 40%;
        height: 50px;
        padding: 12px;
        font-size: 15px;
        border-radius: 5px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        opacity: 0.9;
    }

    .contact-form .text-box:first-child{
        margin-right: 15px;
    }

    .contact-form textarea{
        background: #212121;
        color: #fff;
        border: none;
        width: 100%;
        padding: 12px;
        font-size: 15px;
        min-height: 100px;
        max-height: 200px;
        resize: vertical;
        border-radius: 5px;
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        margin-bottom: 20px;
        opacity: 0.9;
    }

    .contact-form .send-btn{
        float: right;
        color: black;
        background: white;
        border: 1px solid #c32865;
        width: 120px;
        height: 40px;
        font-size: 15px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        border-radius: 5px;
        cursor: pointer;
        transition: 0.3s;
        transition-property: background;
    }

    .contact-form .send-btn:hover{
        background: #c32865;
    }

    @media screen and (max-width: 950px){
        .contact-section{
            flex-direction: column;
        }

        .contact-info, .contact-form{
            margin: 30px 50px;
        }

        .contact-form h2{
            font-size: 30px;
        }

        .contact-form .text-box{
            width: 100%;
        }
    }
</style>

<!--contact section start-->
<div class="contact-section">
    <div class="contact-info">
        <div><i class="fas fa-envelope"></i>2134739@talnet.nl</div>
    </div>
    <div class="contact-form">
        <form class="contact" action="" method="post">
            <input type="text" name="name" class="text-box" placeholder="Your Name" required>
            <input type="email" name="email" class="text-box" placeholder="Your Email" required>
            <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
          <input type="submit" name="submit" class="send-btn" value="Send">
        </form>
      </div>
    </div>
    <!--contact section end-->
</body>
</html>
